<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoe Management Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Shoe Management Admin Dashboard</h1>
    </header>
    <main>
        <section id="shoe-list">
            <h2>Shoe List</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Size</th>
                        <th>Price</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Shoe items will be listed here -->
                </tbody>
            </table>
        </section>
        <section id="shoe-form">
            <h2>Add New Shoe</h2>
            <form>
                <label for="shoe-name">Name:</label>
                <input type="text" id="shoe-name" required>
                <label for="shoe-size">Size:</label>
                <input type="number" id="shoe-size" required>
                <label for="shoe-price">Price:</label>
                <input type="number" id="shoe-price" required>
                <button type="submit">Add Shoe</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Shoe Management</p>
    </footer>
</body>
</html>
